
{% block content %}

<div class="google-login-page">

    <!-- Page Title -->
    <h2 class="title">Sign in with Google</h2>

    <p class="subtitle">Click continue to sign in using your Google account.</p>

    <!-- Continue Button -->
    <a href="/" onclick="signInWithGoogleAndSendToken()" class="google-btn">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="google-icon">
        Continue with Google
    </a>


</div>

<style>
.google-login-page {
    max-width: 500px;
    margin: 80px auto;
    text-align: center;
}
.title {
    font-size: 28px;
    font-weight: 700;
    color: #222;
}
.subtitle {
    color: #555;
    margin-bottom: 20px;
}
.google-btn {
    display: inline-flex;
    align-items: center;
    padding: 12px 22px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
    text-decoration: none;
    color: #444;
    gap: 10px;
    transition: 0.2s;
}
.google-btn:hover {
    background: #f5f5f5;
    border-color: #ccc;
}
.google-icon {
    width: 22px;
    height: 22px;
}
</style>

{% endblock %}
